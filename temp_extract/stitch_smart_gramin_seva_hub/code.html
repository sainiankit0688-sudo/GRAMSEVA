<div class="fixed bottom-0 left-0 w-full h-1 bg-gradient-to-r from-primary via-secondary to-primary-container opacity-50"></div>
<script>
        function showStep(stepId) {
            const steps = ['step-mobile', 'step-otp'];
            const numberInput = document.getElementById('mobile-number').value;
            
            if (stepId === 'step-otp') {
                document.getElementById('display-number').textContent = numberInput || '98765 43210';
            }

            steps.forEach(id => {
                const el = document.getElementById(id);
                if (id === stepId) {
                    el.classList.remove('hidden');
                    el.classList.add('animate-in', 'fade-in', 'duration-500');
                } else {
                    el.classList.add('hidden');
                }
            });
        }

        // Auto-focus OTP inputs logic
        const inputs = document.querySelectorAll('#otp-inputs input');
        inputs.forEach((input, index) => {
            input.addEventListener('keyup', (e) => {
                if (e.key >= 0 && e.key <= 9) {
                    if (index < inputs.length - 1) inputs[index + 1].focus();
                } else if (e.key === 'Backspace') {
                    if (index > 0) inputs[index - 1].focus();
                }
            });
        });

        // Simple scale interaction for buttons via JS for extra polish
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('mousedown', () => btn.style.transform = 'scale(0.97)');
            btn.addEventListener('mouseup', () => btn.style.transform = 'scale(1)');
            btn.addEventListener('mouseleave', () => btn.style.transform = 'scale(1)');
        });
    </script>
